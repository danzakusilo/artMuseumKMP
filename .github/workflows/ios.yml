name: iOS build (manual)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build iosApp on iOS Simulator
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build iosApp
        working-directory: iosApp
        run: |
          device=$(xcrun xctrace list devices 2>&1 \
            | grep -oE 'iPhone.*?[^\(]+' \
            | head -1 \
            | awk '{$1=$1;print}' \
            | sed -e 's/ Simulator$//')
          xcodebuild build \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=$device" \
            -derivedDataPath ../build/derivedData \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY=

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: iosApp-simulator-debug
          path: build/derivedData/Build/Products/Debug-iphonesimulator/
          if-no-files-found: error
